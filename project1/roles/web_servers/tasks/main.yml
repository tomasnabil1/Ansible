  - name: install apache2 and libapache2-mod-php packages
    tags: apache apache2 libapache2-mod-php
    apt:
      name: 
        - apache2
        - libapache2-mod-php
      state: latest
    when: ansible_distribution == "Ubuntu"

  - name: start apache2
    tags: httpd,apache,Ubuntu
    service: 
      name: apache2
      state: started
      enabled: yes
    when: ansible_distribution == "Ubuntu"

  - name: copy the directory
    tags: apache apache2 libapache2-mod-php
    copy:
      src:  defaults_file.html
      dest: /var/www/html/index.html
      owner: root
      group: root
      mode: 0644
