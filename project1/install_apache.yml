---

- hosts: all
  become: true
  tasks:

  - name: update repository index
    apt:
      update_cache: yes

  - name: make directory 
    file:
       path: ~/Ansible/project1
       state: directory

  - name: install apache2 package
    apt:
      name: apache2
      state: latest

  - name: add php support for apache
    apt: 
      name: libapache2-mod-php
      state: latest
    