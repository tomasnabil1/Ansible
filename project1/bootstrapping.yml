---

- hosts: all
  become: true
  pre_tasks:


  - name: install updates for (CentOS)
    tags: CentOS
    dnf:
      update_only: yes
      update_cache: yes
    when: ansible_distribution == "CentOS" 

  - name: install updates for (Ubuntu)
    tags: Ubuntu
    apt: 
      update_cache: yes
    changed_when: false
    when: ansible_distribution == "Ubuntu" 

- hosts: all  
  become: true 
  pre_tasks: 

  - name: Create User
    tags: always
    user:
      name: THomas
      group: root

  - name: add ssh to THomas
    tags: always
    authorized_key: 
      user: THomas
      key: ssh-rsa 
    
  - name: Add THomas to sudoers
    tags: always
    copy:
      src: THomas_sudoers
      dest: /etc/sudoers.d/THomas
      owner: root
      group: root