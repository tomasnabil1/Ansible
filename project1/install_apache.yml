---

- hosts: all
  become: true
  tasks:

  - name: make directory 
    file:
       path: ~/Ansible/project1
       state: directory

  - name: install apache2 and libapache2-mod-php packages For Ubuntu Servers
    apt:
      name: 
        - apache2
        - libapache2-mod-php
      state: latest
      update_cache: yes
    when: ansible_distribution == "Ubuntu"


    